[package]
name = "vcl-protocol"
version = "0.1.0"
edition = "2021"
description = "Verified Commit Link Protocol"

[dependencies]
sha2 = "0.10"
ed25519-dalek = "2.0"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
hex = "0.4"
rand = "0.8"
