[package]
name = "vcl-protocol"
version = "0.1.0"
edition = "2021"
description = "Verified Commit Link Protocol"
license = "MIT"

[lib]
name = "vcl_protocol"
path = "src/lib.rs"

[[bin]]
name = "vcl-protocol"
path = "src/main.rs"

[dependencies]
sha2 = "0.10"
ed25519-dalek = "2.0"
x25519-dalek = "2.0"
chacha20poly1305 = "0.10"
aead = "0.5"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
hex = "0.4"
rand = "0.8"
